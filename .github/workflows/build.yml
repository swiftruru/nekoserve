name: Build NekoServe

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt in to Node.js 24 for all JavaScript-based actions. GitHub deprecated
# Node.js 20 for actions on 2025-09-19 and will force Node 24 by 2026-06-02.
# Setting this env var now silences the deprecation warnings and avoids any
# surprise when the runner default flips. Safe no-op on Node 20 runtimes.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            python-path-check: dist/simulator/simulator
          - os: windows-latest
            platform: win
            python-path-check: dist\simulator\simulator.exe
          - os: ubuntu-latest
            platform: linux
            python-path-check: dist/simulator/simulator

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Python ────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Linux: FUSE for AppImage ───────────────────────
      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fuse libfuse2

      # ── Node dependencies ─────────────────────────────
      # Electron's postinstall script downloads its binary from GitHub
      # Releases, which intermittently returns 504. Retry so a single
      # transient CDN blip doesn't fail the whole matrix.
      - name: Install Node dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      # ── Python dependencies ───────────────────────────
      - name: Install Python dependencies
        run: |
          cd simulator-python
          pip install -r requirements.txt

      # ── Build Python simulator (Unix) ─────────────────
      - name: Build Python simulator (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/build-simulator.sh

      # ── Build Python simulator (Windows) ──────────────
      - name: Build Python simulator (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/build-simulator.ps1

      # ── Verify simulator binary ────────────────────────
      - name: Verify simulator binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="simulator-python/${{ matrix.python-path-check }}"
          if [ -f "$BINARY" ]; then
            echo "Binary found: $BINARY"
            ls -lh "$BINARY"
          else
            echo "ERROR: Binary not found at $BINARY"
            exit 1
          fi

      - name: Verify simulator binary (Windows)
        if: runner.os == 'Windows'
        run: |
          $Binary = "simulator-python\${{ matrix.python-path-check }}"
          if (Test-Path $Binary) {
            Write-Host "Binary found: $Binary"
            Get-Item $Binary | Select-Object Length, FullName
          } else {
            Write-Error "ERROR: Binary not found at $Binary"
            exit 1
          }

      # ── Build Electron app (all platforms) ────────────
      - name: Build Electron renderer + main
        run: npm run ci:build

      # ── Package ───────────────────────────────────────
      # electron-builder downloads platform-specific helpers (nsis on
      # Windows, Squirrel on mac, etc.) from electron-userland/electron-
      # builder-binaries on GitHub Releases, which hits the same flaky
      # CDN as the electron binary install. Retry on 504.
      - name: Package for ${{ matrix.platform }} (macOS)
        if: runner.os == 'macOS'
        uses: nick-fields/retry@v3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_IDENTITY_AUTO_DISCOVERY=false: skip code signing for classroom build
          CSC_IDENTITY_AUTO_DISCOVERY: false
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm run ci:pack:mac

      - name: Package for ${{ matrix.platform }} (Windows)
        if: runner.os == 'Windows'
        uses: nick-fields/retry@v3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm run ci:pack:win

      - name: Package for ${{ matrix.platform }} (Linux)
        if: runner.os == 'Linux'
        uses: nick-fields/retry@v3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm run ci:pack:linux

      # ── Upload artifacts ──────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekoserve-${{ matrix.platform }}-${{ github.sha }}
          path: |
            dist/desktop/*.dmg
            dist/desktop/*.zip
            dist/desktop/*.exe
            dist/desktop/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ── Optional: run Python tests on Ubuntu ──────────────
  test-simulator:
    name: Test Python Simulator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd simulator-python
          pip install -r requirements.txt

      - name: Run golden tests
        run: |
          cd simulator-python
          python -m pytest tests/ -v --tb=short
